<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>PreferenceRank</title>
		<style> 
			:root { 
				--primary: #005dac; 
				--on-primary: #ffffff; 
				--hover: #00539a; 
				--background: #f9f9ff; 
				--surface: #ffffff; 
				--text: #181c21; 
				--border: #c1c6d4; 
				--muted: #f2f3fc; 
				--success: #0b6b1d; 
				--on-success: #ffffff; 
				--danger: #ba1a1a; 
				--on-danger: #ffffff; 
				--highlight-bg: #d4e3ff; 
			} 
 
			@media (prefers-color-scheme: dark) { 
				:root:not(.light) { 
					--primary: #a5c8ff; 
					--on-primary: #00315f; 
					--hover: #72adff; 
					--background: #101319; 
					--surface: #0b0e14; 
					--text: #e0e2ea; 
					--border: #414752; 
					--muted: #181c21; 
					--success: #82db7e; 
					--on-success: #00390a; 
					--danger: #ffb4ab; 
					--on-danger: #93000a; 
					--highlight-bg: #001c3a; 
				} 
			} 
 
			:root.dark { 
				--primary: #a5c8ff; 
				--on-primary: #00315f; 
				--hover: #72adff; 
				--background: #101319; 
				--surface: #0b0e14; 
				--text: #e0e2ea; 
				--border: #414752; 
				--muted: #181c21; 
				--success: #82db7e; 
				--on-success: #00390a; 
				--danger: #ffb4ab; 
				--on-danger: #93000a; 
				--highlight-bg: #001c3a; 
			} 
 
			* { 
				box-sizing: border-box; 
				margin: 0; 
				padding: 0; 
				transition: background-color .3s, color .3s, border-color .3s, outline-color .3s; 
			} 
 
			body { 
				background: var(--background); 
				color: var(--text); 
				font-family: sans-serif; 
				display: flex; 
				align-items: center; 
				justify-content: center; 
				min-height: 100vh; 
				padding: 1rem; 
			} 
 
 
			.container { 
				background: var(--surface); 
				border: 1px solid var(--border); 
				border-radius: 8px; 
				max-width: 720px; 
				padding: 2rem; 
				width: 100%; 
				position: relative; 
			} 
 
			.hidden { 
				display: none !important; 
			} 
 
			h1, h2, label { 
				margin: .5rem 0; 
				display: block; 
			} 
 
			label { 
				font-weight: 700; 
			} 
 
			input, select, textarea, button { 
				background: var(--surface); 
				border: 1px solid var(--border); 
				border-radius: 4px; 
				color: var(--text); 
				font: 1rem sans-serif; 
				padding: .5rem; 
				width: 100%; 
			} 
 
			input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible { 
				outline: 2px solid var(--primary); 
				outline-offset: 2px; 
			} 
 
			textarea { 
				font-family: monospace; 
				min-height: 80px; 
				resize: vertical; 
			} 
 
			button { 
				cursor: pointer; 
				transition: background .1s; 
			} 
 
			button:disabled { 
				background: var(--muted) !important; 
				cursor: not-allowed; 
				opacity: .6; 
			} 
 
			.primary { 
				background: var(--primary); 
				border: none; 
				color: var(--on-primary); 
			} 
 
			.primary:hover:not(:disabled) { 
				background: var(--hover); 
			} 
 
			.secondary:hover:not(:disabled) { 
				background: var(--muted); 
			} 
 
			.count { 
				font-size: .85rem; 
				margin-top: .25rem; 
				text-align: right; 
				opacity: .8; 
			} 
 
			.error { 
				color: var(--danger); 
				font-size: .9rem; 
				margin-top: .5rem; 
				display: block; 
			} 
 
			.selectors { 
				position: absolute; 
				right: 2rem; 
				top: 1rem; 
				display: flex; 
				gap: 8px; 
			} 
 
			.selectors select { 
				width: auto; 
				font-size: .9rem; 
			} 
 
			.row { 
				display: flex; 
				align-items: center; 
				gap: 10px; 
				margin: .75rem 0; 
			} 
 
			.row input { 
				width: auto; 
			} 
 
			.row label { 
				margin: 0; 
			} 
 
			.actions { 
				display: flex; 
				flex-direction: column; 
				gap: 10px; 
				margin-top: 1rem; 
			} 
 
			#battle, #tieWrap, #restartWrap { 
				display: flex; 
				gap: 1rem; 
				margin-top: 1rem; 
			} 
 
			#battle button, #tieWrap button { 
				flex: 1; 
				font-size: 1.2rem; 
				min-height: 100px; 
			} 
 
			#progress { 
				font-size: 1.1rem; 
				margin-top: 1rem; 
				text-align: center; 
			} 
 
			.track { 
				background: var(--muted); 
				border-radius: 4px; 
				height: 6px; 
				margin: 8px auto 0; 
				max-width: 200px; 
				overflow: hidden; 
			} 
 
			.fill { 
				background: var(--primary); 
				height: 100%; 
				width: 0; 
			} 
 
			#tips { 
				background: var(--background); 
				border: 1px solid var(--border); 
				border-radius: 4px; 
				font-size: .85rem; 
				line-height: 1.5; 
				margin-top: 15px; 
				opacity: .9; 
				padding: 8px; 
				text-align: center; 
			} 
 
			#results { 
				overflow: visible;
			} 
 
			.lb-wrap { 
				border-radius: 8px; 
				overflow-x: auto; 
			} 
 
			kbd { 
				background: var(--surface); 
				border: 1px solid var(--border); 
				border-radius: 3px; 
				box-shadow: 0 1px 1px #0003; 
				display: inline-block; 
				font-family: monospace; 
				font-size: .9em; 
				margin: 0 3px; 
				padding: 2px 5px; 
			} 
 
			#cancel, #toggle { 
				background: none; 
				border: 1px solid var(--border); 
				color: var(--text); 
				cursor: pointer; 
				display: block; 
				font-size: .9rem; 
				margin: 1rem auto; 
				padding: 5px 15px; 
				width: auto; 
			} 
 
			#cancel:hover { 
				background: var(--muted); 
			} 
 
			#cancel.confirming { 
				border-color: var(--danger); 
				color: var(--danger); 
			} 
 
			#toggle { 
				border: none; 
				color: var(--primary); 
				text-decoration: underline; 
			} 
 
			.leaderboard { 
				border: 1px solid var(--border); 
				border-radius: 8px; 
				background: var(--surface); 
				margin-top: 1rem; 
			} 
 
			.lb-header { 
				display: flex; 
				padding: 1rem; 
				background: var(--background); 
				border-bottom: 1px solid var(--border); 
				font-weight: 600; 
				color: var(--text); 
				font-size: .9rem; 
				position: sticky; 
				top: 0; 
				z-index: 10; 
				border-top-left-radius: 8px; 
				border-top-right-radius: 8px; 
			} 
 
			.lb-header > div { 
				cursor: pointer; 
				user-select: none; 
				display: flex; 
				align-items: center; 
				gap: .5rem; 
			} 
 
			.lb-header > div:hover { 
				color: var(--primary); 
			} 
 
			.lb-header .lb-col-grade, .lb-header .lb-col-score { 
				justify-content: flex-end; 
			} 
 
			.lb-row { 
				border-bottom: 1px solid var(--border); 
			} 
 
			.lb-row:last-child { 
				border-bottom: none; 
			} 
 
			.lb-row:last-child .lb-main, .lb-row:last-child.expanded .lb-details { 
				border-bottom-left-radius: 8px; 
				border-bottom-right-radius: 8px; 
			} 
 
			.lb-main { 
				display: flex; 
				padding: 1rem; 
				align-items: center; 
				cursor: pointer; 
				background: var(--surface); 
			} 
 
			.lb-main:hover { 
				background: var(--muted); 
			} 
 
			.lb-col-rank { 
				flex: 0 0 90px; 
				display: flex; 
				align-items: center; 
				gap: 8px; 
				font-weight: bold; 
			} 
 
			.lb-col-item { 
				flex: 1; 
				font-weight: 500; 
			} 
 
			.lb-col-grade { 
				flex: 0 0 80px; 
				text-align: right; 
			} 
 
			.lb-col-score { 
				flex: 0 0 90px; 
				text-align: right; 
				font-variant-numeric: tabular-nums; 
			} 
 
			.lb-details { 
				display: none; 
				background: var(--background); 
				padding: 1rem 1rem 1rem calc(1rem + 85px); 
				border-top: 1px solid var(--border); 
				font-size: .9rem; 
			} 
 
			.lb-row.expanded .lb-details { 
				display: block; 
			} 
 
			.lb-row.expanded .chevron { 
				transform: rotate(90deg); 
			} 
 
			.chevron { 
				display: inline-block; 
				transition: transform .2s; 
				font-size: .8rem; 
				color: var(--text); 
				opacity: .6; 
			} 
 
			.detail-grid { 
				display: grid; 
				grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
				gap: 1.5rem; 
			} 
 
			.detail-item { 
				display: flex; 
				flex-direction: column; 
				gap: .25rem; 
			} 
 
			.detail-label { 
				font-size: .75rem; 
				color: var(--text); 
				opacity: .7; 
				font-weight: 600; 
			} 
 
			.detail-value { 
				font-size: 1.1rem; 
				font-weight: 500; 
			} 
 
			.ci-badge { 
				color: var(--text); 
				opacity: .6; 
				font-size: .85rem; 
				margin-left: 4px; 
			} 
 
			.header { 
				display: flex; 
				justify-content: center; 
				align-items: center; 
				position: relative; 
				min-height: 40px; 
				margin-bottom: 1rem; 
			} 
 
			.header #undo { 
				position: absolute; 
				left: 0; 
				top: 50%; 
				transform: translateY(-50%); 
			} 
 
			.header #copy { 
				position: absolute; 
				right: 0; 
				top: 50%; 
				transform: translateY(-50%); 
			} 
 
			#undo, #copy { 
				width: auto; 
			} 
 
			.selected { 
				background: var(--primary) !important; 
				color: var(--on-primary) !important; 
			} 
 
			@media (max-width: 768px) { 
				body { 
					padding: .75rem; 
				} 
 
				.container { 
					padding: 1.5rem; 
				} 
 
				.selectors { 
					position: static; 
					justify-content: flex-end; 
					margin-bottom: .5rem; 
				} 
 
				#battle, #tieWrap, #restartWrap { 
					flex-direction: column; 
				} 
 
				.lb-header, .lb-main { 
					padding: .75rem; 
				} 
 
				.lb-col-grade { 
					flex: 0 0 60px; 
				} 
 
				.lb-col-score { 
					flex: 0 0 90px; 
				} 
 
				.lb-details { 
					padding-left: 1rem; 
				} 
			} 
 
			#sessionModal { 
				position: fixed; 
				inset: 0; 
				background: rgba(0, 0, 0, 0.4); 
				backdrop-filter: blur(4px); 
				z-index: 20; 
				display: flex; 
				align-items: center; 
				justify-content: center; 
				animation: fadeIn .3s ease-out; 
			} 
 
			.session-card { 
				background: var(--surface); 
				border: 1px solid var(--border); 
				border-radius: 16px; 
				box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
				padding: 2.5rem 2rem; 
				max-width: 480px; 
				width: 90%; 
				display: flex; 
				flex-direction: column; 
				align-items: center; 
				text-align: center; 
			} 
 
			@keyframes fadeIn { 
				from { opacity: 0; } 
				to   { opacity: 1; } 
			} 
 
			.session-icon { 
				width: 5rem; 
				height: 5rem; 
				border-radius: 50%; 
				background: var(--highlight-bg); 
				color: var(--primary); 
				display: flex; 
				align-items: center; 
				justify-content: center; 
				font-size: 2.5rem; 
				margin-bottom: 1.5rem; 
				line-height: 1; 
			} 
 
			#sessionTitle { 
				font-size: 1.5rem; 
				margin-bottom: 0.5rem; 
			} 
 
			#sessionMessage { 
				color: var(--text); 
				font-size: 1rem; 
				line-height: 1.6; 
				margin: 0 0 2.5rem; 
				max-width: 480px; 
				opacity: .8; 
			} 
 
			#sessionButtons { 
				display: flex; 
				gap: 1rem; 
				width: 100%; 
				max-width: 400px; 
			} 
 
			#sessionButtons button { 
				flex: 1; 
				padding: 0.75rem 1rem; 
				font-size: 1rem; 
				font-weight: 500; 
			} 
 
			.visually-hidden { 
				position: absolute; 
				width: 1px; 
				height: 1px; 
				padding: 0; 
				margin: -1px; 
				overflow: hidden; 
				clip: rect(0, 0, 0, 0); 
				white-space: nowrap; 
				border: 0; 
			} 
 
			.filter-wrap { 
				margin-bottom: .5rem; 
				text-align: right; 
			} 
 
			#resultFilter { 
				width: 200px; 
				font-size: .9rem; 
				padding: 6px; 
			} 
 
			.spread-track { 
				background: var(--muted); 
				border-radius: 2px; 
				height: 4px; 
				margin-top: 4px; 
				overflow: hidden; 
				position: relative; 
				width: 100%; 
			} 
 
			.spread-bar { 
				background: var(--primary); 
				height: 100%; 
				min-width: 2px; 
				position: absolute; 
			} 
		</style>
	</head>
	<body>
		<div id="container" class="container">
			<div id="selectors" class="selectors">
				<select id="language" aria-label="Language">
					<option value="en">English</option>
					<option value="id">Bahasa Indonesia</option>
				</select>
				<select id="theme" aria-label="Theme">
					<option value="auto">Auto</option>
					<option value="light">Light</option>
					<option value="dark">Dark</option>
				</select>
			</div>
			<div id="sessionModal" class="hidden" role="dialog" aria-modal="true">
				<div class="session-card">
					<div class="session-icon">&#x21BA;</div>
					<h2 id="sessionTitle"></h2>
					<p id="sessionMessage"></p>
					<div id="sessionButtons">
						<button id="sessionContinue" class="primary"></button>
						<button id="sessionNew" class="secondary"></button>
					</div>
				</div>
			</div>
			<div id="inputSection">
				<h1 id="title"></h1>
				<div class="group">
					<label for="items" id="labelItems"></label>
					<textarea id="items" rows="5" spellcheck="false" autofocus aria-describedby="error"></textarea>
					<div id="itemCount" class="count"></div>
					<span id="error" class="error hidden" aria-live="polite"></span>
				</div>
				<div class="row">
					<input type="checkbox" id="allowTies">
					<label for="allowTies" id="labelTies"></label>
				</div>
				<div class="row">
					<input type="checkbox" id="quickRank">
					<label for="quickRank" id="labelQuick"></label>
				</div>
				<div class="actions">
					<button id="resume" class="primary hidden"></button>
					<button id="start" class="primary"></button>
				</div>
			</div>
			<div id="showGradeRow" class="row hidden">
				<input type="checkbox" id="showGrade">
				<label for="showGrade" id="labelGrade"></label>
			</div>
			<div id="announcer" class="visually-hidden" aria-live="polite"></div>
			<button id="undo" class="secondary hidden" disabled></button>
			<button id="copy" class="secondary hidden"></button>
			<div id="battleSection" class="hidden">
				<div id="battle">
					<button id="left" class="secondary"></button>
					<button id="right" class="secondary"></button>
				</div>
				<div id="tieWrap" class="hidden">
					<button id="tie" class="secondary"></button>
				</div>
				<div id="progress"></div>
				<div id="progressTrack" class="track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
					<div id="progressFill" class="fill"></div>
				</div>
				<button id="cancel"></button>
				<button id="toggle"></button>
				<div id="tips" class="hidden"></div>
			</div>
			<div id="results" class="hidden"></div>
			<div id="restartWrap" class="hidden">
				<button id="restartBattle" class="primary"></button>
				<button id="restartNew" class="primary"></button>
			</div>
		</div>
		<script>
			try {
				const initialData = JSON.parse(localStorage.getItem('preferenceRankData'));
				initialData?.settings?.theme && initialData.settings.theme !== 'auto' && (document.documentElement.className = initialData.settings.theme);
			} catch (error) {}
			const text = {
				en: {
					title: 'PreferenceRank',
					languageLabel: 'Language',
					themeLabel: 'Theme',
					autoTheme: 'Auto',
					lightTheme: 'Light',
					darkTheme: 'Dark',
					labelItems: 'Enter items, one per line:',
					labelTies: 'Allow Ties',
					labelQuick: 'Use Quick Rank (fewer comparisons)',
					duplicate: '{count} duplicate item(s) removed.',
					itemsCount: '{count} items',
					start: 'Start Ranking',
					resume: 'Resume Ranking',
					cancel: 'Cancel',
					confirmCancel: 'Confirm Cancel?',
					tie: "It's a Tie",
					undo: 'Undo',
					progress: 'Progress',
					toggleShow: 'Show keyboard shortcuts',
					toggleHide: 'Hide keyboard shortcuts',
					shortcutLeft: 'Left Arrow',
					shortcutRight: 'Right Arrow',
					shortcutTie: 'Up/Down Arrow',
					shortcutUndo: 'Ctrl/⌘ + Z',
					tipTie: 'Keyboard Shortcuts:<br><kbd>←</kbd> Choose left<br><kbd>→</kbd> Choose right<br><kbd>↑</kbd>/<kbd>↓</kbd> Tie<br><kbd>Ctrl/⌘</kbd>+<kbd>Z</kbd> Undo',
					tipNoTie: 'Keyboard Shortcuts:<br><kbd>←</kbd> Choose left<br><kbd>→</kbd> Choose right<br><kbd>Ctrl/⌘</kbd>+<kbd>Z</kbd> Undo',
					resultsTitle: 'Results',
					rank: 'Rank',
					item: 'Item',
					grade: 'Grade',
					score: 'Score',
					compare: 'Compare: {1} vs {2}',
					resultsReady: 'Ranking complete. Results table is shown.',
					restartBattle: 'Restart Battle',
					restartNew: 'Edit Items',
					placeholderItems: 'Apple\nBlueberry\nCherry',
					copy: 'Copy Results',
					copied: 'Copied!',
					resumeTitle: 'Resume Session?',
					resumeMessage: 'A previous ranking session was found. Do you want to continue where you left off?',
					resumeConfirm: 'Continue',
					resumeNew: 'New Session',
					estMatches: ' (~{count} comparisons)',
					labelGrade: 'Show Letter Grades',
					rankSpread: 'Rank Spread',
					matches: 'Matches',
					ci: 'CI (±)',
					filter: 'Filter items...'
				},
				id: {
					title: 'PreferenceRank',
					languageLabel: 'Bahasa',
					themeLabel: 'Tema',
					autoTheme: 'Otomatis',
					lightTheme: 'Terang',
					darkTheme: 'Gelap',
					labelItems: 'Masukkan pilihan, satu per baris:',
					labelTies: 'Izinkan Seri',
					labelQuick: 'Gunakan Peringkat Cepat (lebih sedikit perbandingan)',
					duplicate: '{count} item duplikat dihapus.',
					itemsCount: '{count} pilihan',
					start: 'Mulai Peringkat',
					resume: 'Lanjutkan Peringkat',
					cancel: 'Batal',
					confirmCancel: 'Konfirmasi Batal?',
					tie: 'Seri',
					undo: 'Urungkan',
					progress: 'Kemajuan',
					toggleShow: 'Tampilkan pintasan papan ketik',
					toggleHide: 'Sembunyikan pintasan papan ketik',
					shortcutLeft: 'Panah Kiri',
					shortcutRight: 'Panah Kanan',
					shortcutTie: 'Panah Atas/Bawah',
					shortcutUndo: 'Ctrl/⌘ + Z',
					tipTie: 'Pintasan Papan Ketik:<br><kbd>←</kbd> Pilih kiri<br><kbd>→</kbd> Pilih kanan<br><kbd>↑</kbd>/<kbd>↓</kbd> Seri<br><kbd>Ctrl/⌘</kbd>+<kbd>Z</kbd> Urungkan',
					tipNoTie: 'Pintasan Papan Ketik:<br><kbd>←</kbd> Pilih kiri<br><kbd>→</kbd> Pilih kanan<br><kbd>Ctrl/⌘</kbd>+<kbd>Z</kbd> Urungkan',
					resultsTitle: 'Hasil',
					rank: 'Peringkat',
					item: 'Nama',
					grade: 'Nilai',
					score: 'Skor',
					compare: 'Bandingkan: {1} lawan {2}',
					resultsReady: 'Peringkat selesai. Tabel hasil ditampilkan.',
					restartBattle: 'Mulai Ulang Pertarungan',
					restartNew: 'Ubah Pilihan',
					placeholderItems: 'Apel\nBluberi\nCeri',
					copy: 'Salin Hasil',
					copied: 'Disalin!',
					resumeTitle: 'Lanjutkan Sesi?',
					resumeMessage: 'Sesi peringkat sebelumnya ditemukan. Apakah Anda ingin melanjutkannya?',
					resumeConfirm: 'Lanjutkan',
					resumeNew: 'Sesi Baru',
					estMatches: ' (~{count} perbandingan)',
					labelGrade: 'Tampilkan Nilai Huruf',
					rankSpread: 'Rentang Peringkat',
					matches: 'Pertandingan',
					ci: 'IK (±)',
					filter: 'Cari pilihan...'
				}
			};
			const elements = new Proxy({},{
				get: (_,id)=>document.getElementById(id)
			});
			const Matrix = {
				zeros: (rowCount,columnCount)=>({
					rows: rowCount,
					cols: columnCount,
					data: new Float64Array(rowCount * columnCount)
				}),
				identity: (size)=>{

				setTies(enabled) {

					if (!elements.battleSection.classList.contains('hidden'))
						elements.tieWrap.classList.toggle('hidden', !enabled);
					this.updateHelp();
				}
				getGrade(score) {
					return score >= 1500 ? 'S' : score >= 1250 ? 'A' : score >= 1000 ? 'B' : score >= 750 ? 'C' : score >= 500 ? 'D' : score >= 250 ? 'E' : 'F';
				}
				updateHelp() {
					const hidden = elements.tips.classList.contains('hidden');
					elements.toggle.textContent = this.string(hidden ? 'toggleShow' : 'toggleHide');
					elements.toggle.setAttribute('aria-expanded', !hidden);
					elements.tips.innerHTML = this.string(this.allowTies ? 'tipTie' : 'tipNoTie');
				}
				toggleHelp() {
					elements.tips.classList.toggle('hidden');
					this.updateHelp();
				}
				check(items) {
					const valid = new Set(items || this.getItems()).size >= 2;
					elements.start.disabled = !valid;
					if (valid) {
						elements.error.classList.add('hidden');
						elements.items.removeAttribute('aria-invalid');
					}
					elements.resume.classList.toggle('hidden', !this.provider);
				}
				start() {
					const raw = this.getItems();
					const unique = [...new Set(raw)];
					if (raw.length > unique.length) {
						elements.items.value = unique.join('\n');
						elements.error.textContent = this.string('duplicate').replace('{count}', raw.length - unique.length);
						elements.error.classList.remove('hidden');
						elements.items.setAttribute('aria-invalid', 'true');
						return;
					}
					elements.items.value = unique.join('\n');
					Object.assign(this, {
						items: unique,
						scores: Array(unique.length).fill(1e3),
						matches: [],
						pair: null,
						swapped: false,
						step: 0,
						allowTies: elements.allowTies.checked,
						history: [],
						busy: false,
						swaps: {},
						dirty: true,
						_prevStrength: null
					});
					elements.undo.disabled = true;
					this.provider = new (elements.quickRank.checked ? QuickPairProvider : FullPairProvider)(unique.length);
					elements.tieWrap.classList.toggle('hidden', !this.allowTies);
					this.updateHelp();
					this.display('battleSection');
					this.next();
					this.save();
				}
				resume() {
					this.pair ? (this.display('battleSection'),
					this.render()) : this.results();
				}
				recalculateScores() {
					const n = this.items.length;
					if (!this.dirty && this.scores?.length === n)
						return;
					const wins = new Float64Array(n);
					const adjMaps = Array.from({
						length: n
					}, ()=>new Map());
					for (const {a, b, result} of this.matches) {
						wins[a] += result;
						wins[b] += 1 - result;
						adjMaps[a].set(b, (adjMaps[a].get(b) || 0) + 1);
						adjMaps[b].set(a, (adjMaps[b].get(a) || 0) + 1);
					}
					this.adj = adjMaps.map(m=>{
						const row = new Int32Array(m.size * 2);
						let k = 0;
						for (const [j,c] of m) {
							row[k++] = j;
							row[k++] = c;
						}
						return row;
					}
					);
					const W = new Float64Array(n);
					for (let i = 0; i < n; i++)
						W[i] = wins[i] + 0.5;
					const s = new Float64Array(n);
					for (let i = 0; i < n; i++) {
						let games = 1;
						const row = this.adj[i];
						for (let k = 1; k < row.length; k += 2)
							games += row[k];
						s[i] = W[i] / games;
					}
					let ls = 0;
					for (let i = 0; i < n; i++)
						ls += Math.log(s[i]);
					{
						const sc = Math.exp(ls / n);
						for (let i = 0; i < n; i++)
							s[i] /= sc;
					}
					const RENORM = 16;
					const prevLogS = new Float64Array(n);
					for (let i = 0; i < n; i++) prevLogS[i] = Math.log(s[i]);




					for (let iter = 0; iter < 200; iter++) {
						let maxDelta = 0;
						for (let i = 0; i < n; i++) {
							const si = s[i];
							let denom = 1 / (si + 1) + 1e-12;
							const row = this.adj[i];
							for (let k = 0, len = row.length; k < len; k += 2)
								denom += row[k + 1] / (si + s[row[k]]);
							s[i] = W[i] / denom;
						}
						if ((iter & (RENORM - 1)) === RENORM - 1 || iter === 199) {
							let lsum = 0;
							for (let i = 0; i < n; i++) lsum += Math.log(s[i]);
							const sc = lsum / n;
							const scale = Math.exp(sc);
							for (let i = 0; i < n; i++) {
								s[i] /= scale;
								const curLog = Math.log(s[i]);
								const delta = Math.abs(curLog - prevLogS[i]);
								if (delta > maxDelta) maxDelta = delta;
								prevLogS[i] = curLog;
							}
							if (iter > 0 && maxDelta < 1e-7) break;
						}
					}
					const INV_LOG10 = 400 / Math.log(10);
					const rawScores = new Float64Array(n);
					for (let i = 0; i < n; i++)
						rawScores[i] = 1000 + Math.log(s[i]) * INV_LOG10;



					this._rawScores = Array.from(rawScores);
					let low = -1000, high = 1000, offset = 0;
					for (let i = 0; i < 40; i++) {
						let mid = (low + high) / 2;
						let sum = 0;
						for (let j = 0; j < n; j++) sum += Math.max(0, rawScores[j] + mid);
						sum / n > 1000 ? high = mid : low = mid;
						offset = mid;
					}
					this.scores = Array.from(rawScores, v => Math.max(0, v + offset));
					this.dirty = false;
				}
				choose(winner) {
					if (this.busy || elements.battleSection.classList.contains('hidden'))
						return;
					this.busy = true;
					this.history.push({
						pair: this.pair,
						step: this.step,
						swapped: this.swapped,
						state: null
					});
					const [a,b] = this.pair;
					const result = winner === 'tie' ? .5 : +(winner === (this.swapped ? 'right' : 'left'));
					this.matches.push({
						a,
						b,
						result
					});
					this.dirty = true;
					this.step++;
					elements.undo.disabled = false;
					this.updateProgress();
					this.clear();
					(winner === 'tie' ? elements.tie : elements[winner]).classList.add('selected');
					setTimeout(()=>(!elements.battleSection.classList.contains('hidden') && this.busy && (this.busy = false,
					this.next(result),
					this.save())), 150);
				}
				next(result) {
					this.clear();
					const nextPair = this.provider.next(this, result);
					if (!nextPair)
						return this.pair = null,
						this.results();
					this.pair = nextPair;
					this.swapped = this.swaps[[...nextPair].sort().join('-')] ??= Math.random() < .5;
					this.render();
				}
				render() {
					let[a,b] = this.pair;
					if (this.swapped)
						[a,b] = [b, a];
					elements.left.textContent = this.items[a];
					elements.right.textContent = this.items[b];
					this.updateProgress();
					elements.announcer.textContent = this.string('compare').replace('{1}', this.items[a]).replace('{2}', this.items[b]);
				}
				updateProgress() {
					const progress = this.provider ? this.provider.getProgress(this.step) : '0/0';
					elements.progress.textContent = `${this.string('progress')}: ${progress}`;
					const [current,total] = progress.split('/');
					const percent = Math.min(100, Math.max(0, parseInt(total.replace('~', '')) > 0 ? parseInt(current) / parseInt(total.replace('~', '')) * 100 : 0));
					elements.progressFill.style.width = `${percent}%`;
					elements.progressTrack.setAttribute('aria-valuenow', Math.round(percent));
				}
				clear() {
					['left', 'right', 'tie'].forEach(id=>elements[id].classList.remove('selected'));
				}
				filterResults(term) {
					this.filterTerm = term;
					const lower = term.toLowerCase();
					elements.results.querySelectorAll('.lb-row').forEach(row=>{
						const t = row.querySelector('.lb-col-item').textContent.toLowerCase();
						row.classList.toggle('hidden', !t.includes(lower));
					}
					);
				}
				sortResults(column) {
					const direction = this.sortState.column === column && this.sortState.direction === 'asc' ? 'desc' : 'asc';
					this.sortState = {
						column,
						direction
					};
					this.results();
				}
				results(preventFocus) {
					const dirty = this.dirty;
					this.recalculateScores();
					elements.results.parentElement.append(elements.undo, elements.copy, elements.showGradeRow);
					const baseRanking = [...this.scores.keys()].sort((a,b)=>this.scores[b] - this.scores[a]);
					const ranks = [];
					baseRanking.forEach((x,i)=>ranks[x] = i + 1);
					if (dirty || !this.stats)
						this.stats = Stats.calculate(this.items, this.scores, this.adj, this._rawScores);
					const sortDir = this.sortState.direction === 'asc' ? 1 : -1;
					const sorters = {
						rank: (a,b)=>(this.scores[b] - this.scores[a]) * sortDir,
						rankSpread: (a,b)=>this.stats?.spreads ? (this.stats.spreads[a][0] - this.stats.spreads[b][0] || this.stats.spreads[a][1] - this.stats.spreads[b][1]) * sortDir : 0,
						item: (a,b)=>this.items[a].localeCompare(this.items[b]) * sortDir,
						grade: (a,b)=>(this.scores[b] - this.scores[a]) * sortDir,
						score: (a,b)=>(this.scores[a] - this.scores[b]) * sortDir,
						ci: (a,b)=>this.stats?.cis ? (this.stats.cis[a] - this.stats.cis[b]) * sortDir : 0
					};
					this.currentRanking = [...this.scores.keys()].sort(sorters[this.sortState.column] || sorters.rank);
					const ranking = this.currentRanking;
					elements.results.innerHTML = '';
					const headerWrapper = document.createElement('div');
					headerWrapper.className = 'header';
					headerWrapper.innerHTML = `<h2>${this.string('resultsTitle')}</h2>`;
					headerWrapper.appendChild(elements.undo);
					headerWrapper.appendChild(elements.copy);
					elements.results.appendChild(headerWrapper);
					const filterDiv = document.createElement('div');
					filterDiv.className = 'filter-wrap';
					filterDiv.innerHTML = `<input type="search" id="resultFilter" placeholder="${this.string('filter')}" aria-label="${this.string('filter')}" value="${this.filterTerm || ''}">`;
					elements.results.appendChild(filterDiv);
					elements.results.appendChild(elements.showGradeRow);
					elements.showGradeRow.classList.remove('hidden');
					const arrow = this.sortState.direction === 'asc' ? ' ▲' : ' ▼';
					const getSortIcon = col=>this.sortState.column === col ? arrow : '';
					const getSortState = col=>this.sortState.column === col ? (this.sortState.direction === 'asc' ? 'ascending' : 'descending') : 'none';
					const lb = document.createElement('div');
					lb.className = 'leaderboard';
					lb.setAttribute('role', 'table');
					lb.innerHTML = `
					<div class="lb-header" role="row">
						<div class="lb-col-rank" role="columnheader" tabindex="0" aria-sort="${getSortState('rank')}" data-sort="rank">${this.string('rank')}${getSortIcon('rank')}</div>
						<div class="lb-col-item" role="columnheader" tabindex="0" aria-sort="${getSortState('item')}" data-sort="item">${this.string('item')}${getSortIcon('item')}</div>
						${this.showGrade ? `<div class="lb-col-grade" role="columnheader" tabindex="0" aria-sort="${getSortState('grade')}" data-sort="grade">${this.string('grade')}${getSortIcon('grade')}</div>` : ''}
						<div class="lb-col-score" role="columnheader" tabindex="0" aria-sort="${getSortState('score')}" data-sort="score">${this.string('score')}${getSortIcon('score')}</div>
					</div>
					<div class="lb-body" role="rowgroup"></div>`;
					const body = lb.querySelector('.lb-body');
					const hasStats = this.stats && this.stats.spreads;
					const itemMatches = Array(this.items.length).fill(0);
					this.matches.forEach(m=>{
						itemMatches[m.a]++;
						itemMatches[m.b]++;
					}
					);
					ranking.forEach(x=>{
						const row = document.createElement('div');
						row.className = 'lb-row';
						const rank = ranks[x];
						const item = this.items[x];
						const score = Math.round(this.scores[x]);
						const ci = hasStats ? Math.round(this.stats.cis[x]) : null;
						const spread = hasStats ? `${this.stats.spreads[x][0]} — ${this.stats.spreads[x][1]}` : null;
						let spreadBar = '';
						if (hasStats) {
							const [min,max] = this.stats.spreads[x];
							const total = this.items.length;
							const pMin = total > 1 ? ((min - 1) / (total - 1)) * 100 : 0;
							const pWidth = total > 1 ? ((max - min) / (total - 1)) * 100 : 100;
							spreadBar = `<div class="spread-track" title="${spread}"><div class="spread-bar" style="left:${pMin}%;width:${pWidth}%"></div></div>`;
						}
						row.innerHTML = `
						<div class="lb-main" role="button" tabindex="0">
							<div class="lb-col-rank"><span class="chevron">&#x203a;</span><span>${rank}</span></div>
							<div class="lb-col-item">${new Option(item).innerHTML}</div>
							${this.showGrade ? `<div class="lb-col-grade">${this.getGrade(score)}</div>` : ''}
							<div class="lb-col-score">${score}${ci !== null ? `<span class="ci-badge">±${ci}</span>` : ''}</div>
						</div>
						<div class="lb-details">
							<div class="detail-grid">
								${spread ? `<div class="detail-item"><span class="detail-label">${this.string('rankSpread')}</span><span class="detail-value">${spread}</span>${spreadBar}</div>` : ''}
								<div class="detail-item"><span class="detail-label">${this.string('matches')}</span><span class="detail-value">${itemMatches[x]}</span></div>
							</div>
						</div>`;
						const main = row.querySelector('.lb-main');
						const toggle = ()=>row.classList.toggle('expanded');
						main.onclick = toggle;
						main.onkeydown = e=>{
							if (e.key === 'Enter' || e.key === ' ') {
								e.preventDefault();
								toggle();
							}
						}
						;
						body.appendChild(row);
					}
					);
					elements.results.appendChild(lb);
					elements.resultFilter = document.getElementById('resultFilter');
					elements.resultFilter.oninput = e=>this.filterResults(e.target.value);
					if (this.filterTerm)
						this.filterResults(this.filterTerm);
					this.display('results', preventFocus);
					elements.announcer.textContent = this.string('resultsReady');
					this.save();
				}
				display(section, preventFocus) {
					document.body.classList.toggle('results-mode', section === 'results');
					elements.container.classList.toggle('input-mode', section === 'inputSection');
					['inputSection', 'battleSection', 'results'].forEach(id=>elements[id].classList.toggle('hidden', id !== section));
					elements.selectors.classList.toggle('hidden', section !== 'inputSection');
					elements.restartWrap.classList.toggle('hidden', section !== 'results');
					elements.undo.classList.toggle('hidden', section === 'inputSection');
					elements.copy.classList.toggle('hidden', section !== 'results');
					elements.showGradeRow.classList.toggle('hidden', section !== 'results');
					if (section !== 'results')
						elements.results.parentElement.appendChild(elements.showGradeRow);
					if (section === 'battleSection')
						elements.battleSection.before(elements.undo);
					if (section === 'results') {
						elements.results.firstChild.prepend(elements.undo);
						elements.results.firstChild.appendChild(elements.copy);
					}
					if (section === 'inputSection')
						this.updateInputState();
					const focusTarget = {
						battleSection: elements.left,
						inputSection: elements.items
					}[section];
					if (focusTarget && !preventFocus)
						setTimeout(()=>focusTarget.focus(), 50);
				}
				copyResults() {
					const baseRanking = [...this.scores.keys()].sort((a,b)=>this.scores[b] - this.scores[a]);
					const ranks = [];
					baseRanking.forEach((x,i)=>ranks[x] = i + 1);
					const ranking = this.currentRanking || baseRanking;
					const hasStats = this.stats && this.stats.spreads;
					const headers = (hasStats ? (this.showGrade ? ['rank', 'rankSpread', 'item', 'grade', 'score', 'ci'] : ['rank', 'rankSpread', 'item', 'score', 'ci']) : (this.showGrade ? ['rank', 'item', 'grade', 'score'] : ['rank', 'item', 'score'])).map(k=>this.string(k)).join('\t');
					const lines = ranking.map(x=>{
						const score = Math.round(this.scores[x]);
						const row = [ranks[x]];
						if (hasStats)
							row.push(`${this.stats.spreads[x][0]}—${this.stats.spreads[x][1]}`);
						row.push(this.items[x]);
						if (this.showGrade)
							row.push(this.getGrade(score));
						row.push(score);
						if (hasStats)
							row.push(`±${Math.round(this.stats.cis[x])}`);
						return row.join('\t');
					}
					);
					navigator.clipboard.writeText([headers, ...lines].join('\n')).then(()=>{
						clearTimeout(this.copyTimeout);
						elements.copy.textContent = this.string('copied');
						elements.announcer.textContent = `${this.string('resultsTitle')} ${this.string('copied')}`;
						this.copyTimeout = setTimeout(()=>elements.copy.textContent = this.string('copy'), 2e3);
					}
					);
				}
				cancel() {
					const reset = ()=>{
						elements.cancel.classList.remove('confirming');
						elements.cancel.textContent = this.string('cancel');
						this.cancelTimeout = null;
					}
					;
					this.cancelTimeout ? (clearTimeout(this.cancelTimeout),
					reset(),
					this.display('inputSection')) : (elements.cancel.textContent = this.string('confirmCancel'),
					elements.cancel.classList.add('confirming'),
					this.cancelTimeout = setTimeout(reset, 3000));
				}
				undo() {
					if (!this.busy && this.history.length) {
						const last = this.history.pop();
						this.matches.pop();
						this.dirty = true;
						Object.assign(this, {
							step: last.step,
							pair: last.pair,
							swapped: last.swapped
						});
						if (this.provider instanceof QuickPairProvider)
							this.provider._start(this.matches);
						this.render();
						this.display('battleSection');
						elements.undo.disabled = !this.history.length;
						this.save();
					}
				}
				reset() {
					Object.assign(this, {
						scores: [],
						matches: [],
						history: [],
						provider: null,
						dirty: true,
						_prevStrength: null
					});
					this.display('inputSection');
					this.updateHelp();
					this.updateProgress();
					this.save();
				}
				key(event) {
					if (event.repeat)
						return;
					const {key, ctrlKey, metaKey, shiftKey} = event;
					const isModifier = ctrlKey || metaKey;
					const isInputVisible = !elements.inputSection.classList.contains('hidden');
					const isStartEnabled = !elements.start.disabled;
					if (key === 'Enter' && isModifier && isInputVisible && isStartEnabled) {
						event.preventDefault();
						elements.start.click();
						return;
					}
					const action = {
						arrowleft: 'left',
						arrowright: 'right',
						arrowup: 'tie',
						arrowdown: 'tie',
						z: 'undo',
						'?': 'toggle',
						'/': 'toggle'
					}[key.toLowerCase()];
					if (!action || isInputVisible || /^(SELECT|INPUT|TEXTAREA)$/.test(document.activeElement.tagName))
						return;
					const isBattleVisible = !elements.battleSection.classList.contains('hidden');
					const isTieAllowed = action !== 'tie' || this.allowTies;
					if (action === 'undo' && isModifier && !shiftKey) {
						event.preventDefault();
						elements.undo.click();
					}
					if (action !== 'undo' && isBattleVisible && isTieAllowed) {
						event.preventDefault();
						elements[action].click();
						document.activeElement?.blur();
					}
				}
			}
			window.app = new PreferenceRank();
		</script>
	</body>
</html>
